name: Backend CI

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
      - develop
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  verify-backend:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: optica_user
          POSTGRES_PASSWORD: optica_password_2026
          POSTGRES_DB: optica_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U optica_user -d optica_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SECRET_KEY: test_secret_key_change_me
      DATABASE_URL: postgresql+asyncpg://optica_user:optica_password_2026@localhost:5432/optica_test
      TEST_DATABASE_URL: postgresql+asyncpg://optica_user:optica_password_2026@localhost:5432/optica_test
      MONGODB_URL: mongodb://localhost:27017/optica_clinico
      REDIS_URL: redis://localhost:6379/0
      ENVIRONMENT: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install OS libraries for report rendering
        run: |
          sudo apt-get update
          sudo apt-get install -y libpango-1.0-0 libpangoft2-1.0-0 libgdk-pixbuf-2.0-0 libffi-dev shared-mime-info

      - name: Install backend dependencies
        working-directory: backend
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Verify dependencies and syntax
        working-directory: backend
        run: python scripts/verify_backend.py --skip-pytest

      - name: Audit API endpoint security guards
        working-directory: backend
        run: python scripts/audit_api_security.py

      - name: Verify Alembic migrations from scratch and roundtrip
        working-directory: backend
        run: python scripts/verify_migrations.py --roundtrip

      - name: Run backend tests
        working-directory: backend
        run: python scripts/verify_backend.py -- -q

      - name: Run API/database smoke E2E tests
        working-directory: backend
        run: python -m pytest tests/test_e2e_smoke.py -q
