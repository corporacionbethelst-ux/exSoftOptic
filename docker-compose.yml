version: '3.8'

services:
  # PostgreSQL - Base de datos principal
  postgres:
    image: postgres:16-alpine
    container_name: optica_postgres
    environment:
      POSTGRES_USER: optica_user
      POSTGRES_PASSWORD: optica_password_2026
      POSTGRES_DB: optica_system
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - optica_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optica_user -d optica_system"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Caché y colas
  redis:
    image: redis:7-alpine
    container_name: optica_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - optica_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MongoDB - Datos clínicos
  mongodb:
    image: mongo:7
    container_name: optica_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: optica_admin
      MONGO_INITDB_ROOT_PASSWORD: optica_mongo_2026
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - optica_network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5

  # Backend FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optica_backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://optica_user:optica_password_2026@postgres:5432/optica_system
      - REDIS_URL=redis://redis:6379/0
      - MONGODB_URL=mongodb://optica_admin:optica_mongo_2026@mongodb:27017/optica_clinico?authSource=admin
      - SECRET_KEY=tu_secret_key_super_seguro_cambiar_en_produccion_2026
      - ALGORITHM=HS256
      - ACCESS_TOKEN_EXPIRE_MINUTES=30
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - optica_network
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Redis Commander - UI para Redis (opcional)
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: optica_redis_ui
    environment:
      - REDIS_HOSTS=local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - optica_network

  # Mongo Express - UI para MongoDB (opcional)
  mongo-express:
    image: mongo-express:1
    container_name: optica_mongo_ui
    environment:
      - ME_CONFIG_MONGODB_ADMINUSERNAME=optica_admin
      - ME_CONFIG_MONGODB_ADMINPASSWORD=optica_mongo_2026
      - ME_CONFIG_MONGODB_URL=mongodb://optica_admin:optica_mongo_2026@mongodb:27017/
      - ME_CONFIG_BASICAUTH=false
    ports:
      - "8082:8081"
    depends_on:
      - mongodb
    networks:
      - optica_network

volumes:
  postgres_data:
  redis_data:
  mongodb_data:

networks:
  optica_network:
    driver: bridge